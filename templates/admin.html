{% extends "base.html" %}
{% block content %}
<section class="py-12 bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-brand-navy">Admin Dashboard</h1>
            <a href="{{ url_for('logout') }}" class="text-red-600 hover:text-red-800 font-semibold underline">Logout</a>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Add New Project</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded relative mb-6">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin') }}" enctype="multipart/form-data" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Project Name *</label>
                        <input type="text" id="name" name="name" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label for="client" class="block text-sm font-medium text-gray-700 mb-1">Client Name</label>
                        <input type="text" id="client" name="client"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                </div>

                <div>
                    <label for="city" class="block text-sm font-medium text-gray-700 mb-1">City/Location</label>
                    <input type="text" id="city" name="city" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Project
                        Description</label>
                    <textarea id="description" name="description" rows="4"
                        class="w-full px-4 py-2 border border-gray-300 rounded-md"></textarea>
                </div>

                <div>
                    <label for="images" class="block text-sm font-medium text-gray-700 mb-1">Project Images (Up to
                        10)</label>
                    <input type="file" id="images" name="images" multiple accept="image/*"
                        class="w-full px-4 py-2 border border-gray-300 rounded-md" aria-describedby="file_input_help">
                    <p class="mt-1 text-sm text-gray-500" id="file_input_help">Select multiple image files to upload.
                    </p>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <button type="submit" class="btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
