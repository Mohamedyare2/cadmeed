{% extends "base.html" %}
{% block content %}
<section class="py-16 relative bg-navy min-h-screen">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

        <div
            class="flex flex-col md:flex-row justify-between items-center bg-navy-accent/50 p-6 rounded-2xl border border-white/5 mb-10 animate-fade-in-up">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 bg-orange text-navy rounded-full flex items-center justify-center font-bold text-xl shadow-glow">
                    A
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white">Admin Dashboard</h1>
                    <p class="text-slate-400 text-sm">Manage your portfolio projects</p>
                </div>
            </div>
            <a href="{{ url_for('logout') }}"
                class="mt-4 md:mt-0 px-6 py-2 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white border border-red-500/20 rounded-full font-bold transition-colors">
                Secure Logout
            </a>
        </div>

        <div class="glass-card rounded-[2rem] p-8 md:p-12 animate-fade-in-up shadow-2xl" style="animation-delay: 0.1s">
            <h2 class="text-3xl font-black text-white mb-2">Publish New Project</h2>
            <div class="h-1 w-16 bg-orange rounded-full mb-8"></div>

            <form method="POST" action="{{ url_for('admin') }}" enctype="multipart/form-data" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                    <div class="space-y-2">
                        <label for="name" class="block text-sm font-bold text-slate-300 uppercase tracking-wide">Project
                            Name <span class="text-orange">*</span></label>
                        <input type="text" id="name" name="name" required
                            class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600"
                            placeholder="E.g. Villa Royal Decor">
                    </div>

                    <div class="space-y-2">
                        <label for="client"
                            class="block text-sm font-bold text-slate-300 uppercase tracking-wide">Client Name</label>
                        <input type="text" id="client" name="client"
                            class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600"
                            placeholder="E.g. Mr. Ahmed">
                    </div>

                </div>

                <div class="space-y-2">
                    <label for="city"
                        class="block text-sm font-bold text-slate-300 uppercase tracking-wide">City/Location</label>
                    <input type="text" id="city" name="city"
                        class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600"
                        placeholder="E.g. Hargeisa, Somaliland">
                </div>

                <div class="space-y-2">
                    <label for="description" class="block text-sm font-bold text-slate-300 uppercase tracking-wide">Full
                        Description</label>
                    <textarea id="description" name="description" rows="5"
                        class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600"
                        placeholder="Describe the magnificent work done on this project..."></textarea>
                </div>

                <div
                    class="bg-navy/50 border border-dashed border-orange/50 rounded-xl p-8 text-center hover:bg-navy/80 transition cursor-pointer relative">
                    <div class="text-4xl mb-4">📸</div>
                    <label for="images" class="block text-lg font-bold text-white mb-2 cursor-pointer">
                        Upload Project Images <span class="text-orange underline">(Max 10)</span>
                    </label>
                    <p class="text-sm text-slate-400 mb-6">Select high quality images to showcase your work.</p>
                    <input type="file" id="images" name="images" multiple accept="image/*"
                        class="w-full max-w-sm mx-auto bg-navy-accent p-2 rounded-lg text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-orange file:text-navy file:font-bold hover:file:bg-orange-light cursor-pointer">
                </div>

                <div class="pt-6 border-t border-white/5 flex gap-4 flex-col sm:flex-row">
                    <button type="submit" class="btn-orange w-full sm:w-1/2 py-4 text-lg">
                        Publish to Gallery
                    </button>
                    <a href="{{ url_for('gallery') }}"
                        class="w-full sm:w-1/2 py-4 text-lg font-bold rounded-full bg-white/5 text-white border border-white/10 text-center hover:bg-white/10 transition">
                        Cancel & View Gallery
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
