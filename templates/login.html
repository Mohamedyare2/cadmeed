{% extends "base.html" %}
{% block content %}
<section class="min-h-[80vh] flex items-center justify-center py-20 px-4 relative bg-navy overflow-hidden">
    <!-- Cool Background Orbs -->
    <div
        class="absolute top-1/4 left-1/4 w-96 h-96 bg-orange rounded-full mix-blend-screen filter blur-[150px] opacity-20 animate-pulse">
    </div>
    <div
        class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-500 rounded-full mix-blend-screen filter blur-[150px] opacity-10">
    </div>

    <div class="w-full max-w-md relative z-10 animate-fade-in-up">

        <div class="glass-card p-10 rounded-[2rem] shadow-2xl relative overflow-hidden">
            <!-- Decorative line -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange to-yellow-500"></div>

            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-navy border-2 border-orange/50 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-glow rotate-3">
                    <span class="text-3xl">🔐</span>
                </div>
                <h2 class="text-3xl font-black text-white">Admin <span class="text-orange">Portal</span></h2>
                <p class="text-slate-400 font-medium mt-2">Secure access for management</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div>
                    <label for="username"
                        class="block text-sm font-bold text-slate-300 mb-2 uppercase tracking-wide">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-5 py-4 bg-navy-accent/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange focus:border-transparent text-white placeholder-slate-500 outline-none transition-all duration-300"
                        placeholder="Enter admin username">
                </div>

                <div>
                    <label for="password"
                        class="block text-sm font-bold text-slate-300 mb-2 uppercase tracking-wide">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-5 py-4 bg-navy-accent/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange focus:border-transparent text-white placeholder-slate-500 outline-none transition-all duration-300"
                        placeholder="••••••••">
                </div>

                <button type="submit" class="w-full btn-orange mt-2 h-14 text-lg">
                    Secure Login
                </button>
            </form>
        </div>

    </div>
</section>
{% endblock %}
