{% extends "base.html" %}
{% block content %}
<section class="py-20 bg-white min-h-[60vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-gray-50 p-8 rounded-lg shadow-md border border-gray-100">
        <h2 class="text-3xl font-bold text-brand-navy text-center mb-6">Admin Login</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-gold focus:border-brand-gold bg-white text-gray-900">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand-gold focus:border-brand-gold bg-white text-gray-900">
            </div>
            <div>
                <button type="submit" class="w-full btn-primary">Login</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
