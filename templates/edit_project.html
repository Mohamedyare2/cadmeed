{% extends "base.html" %}
{% block content %}
<section class="py-16 relative bg-navy min-h-screen">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

        <div class="flex items-center gap-4 mb-10 animate-fade-in-up">
            <a href="{{ url_for('gallery') }}"
                class="text-slate-400 hover:text-orange transition flex items-center gap-2 font-semibold">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Gallery
            </a>
        </div>

        <div class="glass-card rounded-[2rem] p-8 md:p-12 animate-fade-in-up shadow-2xl" style="animation-delay: 0.1s">
            <h2 class="text-3xl font-black text-white mb-2">Edit Project</h2>
            <div class="h-1 w-16 bg-orange rounded-full mb-8"></div>

            <form method="POST" action="{{ url_for('edit_project', project_id=project.id) }}" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                    <div class="space-y-2">
                        <label for="name" class="block text-sm font-bold text-slate-300 uppercase tracking-wide">Project
                            Name <span class="text-orange">*</span></label>
                        <input type="text" id="name" name="name" required value="{{ project.name }}"
                            class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600">
                    </div>

                    <div class="space-y-2">
                        <label for="client"
                            class="block text-sm font-bold text-slate-300 uppercase tracking-wide">Client Name</label>
                        <input type="text" id="client" name="client" value="{{ project.client or '' }}"
                            class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600">
                    </div>

                </div>

                <div class="space-y-2">
                    <label for="city"
                        class="block text-sm font-bold text-slate-300 uppercase tracking-wide">City/Location</label>
                    <input type="text" id="city" name="city" value="{{ project.city or '' }}"
                        class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600">
                </div>

                <div class="space-y-2">
                    <label for="description" class="block text-sm font-bold text-slate-300 uppercase tracking-wide">Full
                        Description</label>
                    <textarea id="description" name="description" rows="5"
                        class="w-full px-5 py-4 bg-navy/50 border border-white/10 rounded-xl focus:ring-2 focus:ring-orange text-white outline-none transition-all placeholder-slate-600">{{ project.description or '' }}</textarea>
                </div>

                <div class="pt-6 border-t border-white/5 flex gap-4 flex-col sm:flex-row">
                    <button type="submit" class="btn-orange w-full sm:w-1/2 py-4 text-lg">
                        Save Changes
                    </button>
                    <a href="{{ url_for('gallery') }}"
                        class="w-full sm:w-1/2 py-4 text-lg font-bold rounded-full bg-white/5 text-white border border-white/10 text-center hover:bg-white/10 transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
